<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Board | Submit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body class="submit-page">
  <main class="container">
    <div class="borderContainer">

    </div>
    <section>
      <h1>Dream Viewer</h1>
      <h2>Onde sonhos se tornam ideias</h2>
      <p>Código de sala: <span id="roomCode">1234567</span> <button type="fakeLink">Não é este?</button></p>
      <button type="primary">Fazer a postagem</button>
      <div class="githubInfos">
        Veja as mentes por trás
        <div>
          <a href="https://github.com/LucianoSilva-Dev" target="_blank">LucianoSilva-Dev (Luciano)</a>
          <a href="https://github.com/IgorSilva-S" target="_blank">IgorSilva-S (Igor)</a>
        </div>
      </div>
    </section>

    <section>
      <h1>Conteúdo</h1>
      <p>Dependendo do formato, a quantidade de caracteres pode ser menor</p>
      <div class="textareaContainer">
        <textarea name="" id="idea-text" maxlength="110"></textarea>
        <span id="char-count">0/110</span>
      </div>
      <div>
        <button>Voltar</button>
        <button type="primary">Continuar</button>
      </div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script src="js/submit.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Board | Submit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body class="submit-page">
  <div class="chalkboard-overlay"></div>
  <main class="container">
    <header class="header">
      <h1>Dream Viewer</h1>
      <p>Onde sonhos se tornam ideias</p>
    </header>

    <form id="idea-form" class="form">
      <div class="input-group">
        <label for="idea-text">Escreva seus sonhos e ideias</label>
        <div class="post-it" id="postIt">
          <textarea id="idea-text" maxlength="110" placeholder="Digite algo" required></textarea>
          <span class="char-count">0 / 110</span>
        </div>
      </div>

      <div class="color-picker-wrapper">
        <label for="idea-color">Cor do Post-It</label>
        <input type="color" id="idea-color" value="#FFE566">
      </div>

      <div class="color-picker-wrapper">
        <label for="idea-text-color">Cor do Texto do Post-It</label>
        <input type="color" id="idea-text-color" value="#000">
      </div>

      <button type="submit" class="btn-submit">
        <p>Enviar Post-It (Enter)</p>
      </button>
    </form>
    <div class="githubInfos">
      Veja os GitHubs dos desenvolvedores
      <div>
        <a href="https://github.com/LucianoSilva-Dev" target="_blank">LucianoSilva-Dev (Luciano)</a>
        <a href="https://github.com/IgorSilva-S" target="_blank">IgorSilva-S (Igor)</a>
      </div>
    </div>
    <div id="toast" class="toast">Post-it enviado com sucesso</div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/submit.js"></script>
</body>

</html>

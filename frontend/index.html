<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Board | Submit</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="submit-page">
  <div class="chalkboard-overlay"></div>
  <main class="container">
    <header class="header">
      <h1>IDEA <br> VAULT</h1>
      <p>Materialize the future.</p>
    </header>

    <form id="idea-form" class="form">
      <div class="input-group">
        <label for="idea-text">THE VISION / MAX 110 CHARS</label>
        <div class="post-it">
          <textarea id="idea-text" maxlength="110" placeholder="Type your entrepreneurial dream..." required></textarea>
          <span class="char-count">0 / 110</span>
        </div>
      </div>

      <div class="color-picker-wrapper">
        <label for="idea-color">POST-IT AURA (Color)</label>
        <input type="color" id="idea-color" value="#FFE566">
      </div>

      <div class="color-picker-wrapper">
        <label for="idea-text-color">POST-IT TEXT COLOR</label>
        <input type="color" id="idea-text-color" value="#000">
      </div>

      <button type="submit" class="btn-submit">MANIFEST [ENTER]</button>
    </form>

    <div id="toast" class="toast">Idea Sent to the Board.</div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/submit.js"></script>
</body>

</html>
